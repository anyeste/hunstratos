name: PHP Lint

on:
  push:
    branches: [main]
    paths:
      - 'modules/**'
  pull_request:
    paths:
      - 'modules/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP syntax check
        run: find modules -name "*.php" | xargs php -l
